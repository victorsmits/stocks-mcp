services:

  stocks-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocks-mcp
    restart: unless-stopped
    ports:
      - "8400:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/sse"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s