services:
  postgres:
    image: postgres:17-alpine
    container_name: stocks-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stocks}
      POSTGRES_USER: ${POSTGRES_USER:-stocks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - stocks_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stocks} -d ${POSTGRES_DB:-stocks}"]
      interval: 10s
      timeout: 5s
      retries: 10

  stocks-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocks-mcp
    restart: unless-stopped
    ports:
      - "${PUBLIC_PORT:-8400}:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-stocks}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stocks}
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:?set MCP_PUBLIC_URL in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?set GOOGLE_CLIENT_ID in .env}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:?set GOOGLE_CLIENT_SECRET in .env}
      MCP_JWT_SIGNING_KEY: ${MCP_JWT_SIGNING_KEY:?set MCP_JWT_SIGNING_KEY in .env}
      ALLOWED_GOOGLE_EMAILS: ${ALLOWED_GOOGLE_EMAILS:?set ALLOWED_GOOGLE_EMAILS in .env}
      FASTMCP_HOME: /var/lib/fastmcp
    volumes:
      - stocks_fastmcp_data:/var/lib/fastmcp
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1',8000),3); s.close()"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  stocks_postgres_data:
  stocks_fastmcp_data:
